name: Release zooming to AliCloud OSS

on:
  push:
    tags:
      - "*"
      - "*/*"

permissions:
  contents: read

concurrency:
  group: release-zooming-to-oss-${{ github.ref }}
  cancel-in-progress: true

jobs:
  release:
    if: ${{ startsWith(github.ref, 'refs/tags/') }}
    runs-on: ubuntu-latest
    env:
      OSSUTIL_VERSION: "2.2.1"
      OSSUTIL_ARCHIVE: "ossutil-2.2.1-linux-amd64.zip"
      OSSUTIL_CACHE_DIR: "${{ github.workspace }}/.cache/ossutil"
      OSSUTIL_BIN_DIR: "${{ github.workspace }}/.local/bin"

    steps:
      - name: Checkout source repository
        uses: actions/checkout@v4

      - name: Validate required secrets
        env:
          ALICLOUD_ACCESS_KEY: ${{ secrets.ALICLOUD_ACCESS_KEY }}
          ALICLOUD_SECRET_KEY: ${{ secrets.ALICLOUD_SECRET_KEY }}
          OSS_REGION: ${{ secrets.OSS_REGION }}
          OSS_ENDPOINT: ${{ secrets.OSS_ENDPOINT }}
          OSS_BUCKET: ${{ secrets.OSS_BUCKET }}
          OSS_PREFIX: ${{ secrets.OSS_PREFIX }}
          BASE_URL: ${{ secrets.BASE_URL }}
        run: |
          if [ -z "$ALICLOUD_ACCESS_KEY" ]; then
            echo "Missing required secret: ALICLOUD_ACCESS_KEY"
            exit 1
          fi

          if [ -z "$ALICLOUD_SECRET_KEY" ]; then
            echo "Missing required secret: ALICLOUD_SECRET_KEY"
            exit 1
          fi

          if [ -z "$OSS_REGION" ]; then
            echo "Missing required secret: OSS_REGION"
            exit 1
          fi

          if [ -z "$OSS_ENDPOINT" ]; then
            echo "Missing required secret: OSS_ENDPOINT"
            exit 1
          fi

          if [ -z "$OSS_BUCKET" ]; then
            echo "Missing required secret: OSS_BUCKET"
            exit 1
          fi

          if [ -z "$OSS_PREFIX" ]; then
            echo "Missing required secret: OSS_PREFIX"
            exit 1
          fi

          if [ -z "$BASE_URL" ]; then
            echo "Missing required secret: BASE_URL"
            exit 1
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build zooming
        run: npm run build
        env:
          VITE_BASE_URL: /zooming/

    - name: Cache ossutil
      id: cache-ossutil
      uses: actions/cache@v4
      with:
        path: |
          ${{ env.OSSUTIL_CACHE_DIR }}
          ${{ env.OSSUTIL_BIN_DIR }}/ossutil
        key: ossutil-${{ runner.os }}-amd64-${{ env.OSSUTIL_VERSION }}

    - name: Install ossutil manually
      if: steps.cache-ossutil.outputs.cache-hit != 'true'
      run: |
        mkdir -p "$OSSUTIL_CACHE_DIR" "$OSSUTIL_BIN_DIR"
        sudo apt install -y unzip
        curl -fL -o "$OSSUTIL_CACHE_DIR/$OSSUTIL_ARCHIVE" "https://gosspublic.alicdn.com/ossutil/v2/${OSSUTIL_VERSION}/${OSSUTIL_ARCHIVE}"
        unzip -o "$OSSUTIL_CACHE_DIR/$OSSUTIL_ARCHIVE" -d "$OSSUTIL_CACHE_DIR"
        chmod 755 "$OSSUTIL_CACHE_DIR/ossutil-${OSSUTIL_VERSION}-linux-amd64/ossutil"
        cp "$OSSUTIL_CACHE_DIR/ossutil-${OSSUTIL_VERSION}-linux-amd64/ossutil" "$OSSUTIL_BIN_DIR/ossutil"

    - name: Add ossutil to PATH
      run: |
        mkdir -p "$OSSUTIL_BIN_DIR"
        if [ ! -f "$OSSUTIL_BIN_DIR/ossutil" ]; then
          echo "ossutil binary is missing after cache/installation"
          exit 1
        fi
        chmod 755 "$OSSUTIL_BIN_DIR/ossutil"
        echo "$OSSUTIL_BIN_DIR" >> "$GITHUB_PATH"

    - name: Deploy to OSS bucket
      env:
        OSS_ACCESS_KEY_ID: ${{ secrets.ALICLOUD_ACCESS_KEY }}
        OSS_ACCESS_KEY_SECRET: ${{ secrets.ALICLOUD_SECRET_KEY }}
        OSS_REGION: ${{ secrets.OSS_REGION }}
        OSS_ENDPOINT: ${{ secrets.OSS_ENDPOINT }}
        OSS_BUCKET: ${{ secrets.OSS_BUCKET }}
        OSS_PREFIX: ${{ secrets.OSS_PREFIX }}
      run: |
        TARGET_PATH="oss://${OSS_BUCKET}/${OSS_PREFIX%/}/"
        ossutil sync "dist/" "$TARGET_PATH" --delete --force
        printf "%s\n" "${GITHUB_SHA}" | ossutil cp - "${TARGET_PATH}.source-commit" --force
